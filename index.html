<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musicly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="/Musicly/manifest.webmanifest">
    <meta name="theme-color" content="#050509">
    <meta name="description" content="A simple music streaming web app">

    <!-- 🍎 iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Musicly">
    <link rel="apple-touch-icon" href="/Musicly/icon-180.png">

    <style>
        body {
            background: #050509;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 16px;
            gap: 20px;
        }

        h1 {
            color: #c9a6ff;
            font-size: 32px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #8f5cff;
        }

        #dropzone {
            width: 100%;
            max-width: 360px;
            height: 160px;
            border: 2px dashed #b27bff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d5b7ff;
            font-size: 17px;
            padding: 10px;
            background: rgba(178, 123, 255, 0.05);
            box-shadow: 0 0 12px rgba(178, 123, 255, 0.25);
            transition: 0.2s;
        }

        #dropzone:hover {
            background: rgba(178, 123, 255, 0.12);
            box-shadow: 0 0 18px rgba(178, 123, 255, 0.35);
        }

        .fade-out { opacity: 0; transition: opacity 0.25s ease; }
        .fade-in { opacity: 1; transition: opacity 0.25s ease; }
        .hidden { display: none; }

        #albumGrid {
            width: 100%;
            max-width: 360px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-top: 10px;
        }

        .albumCard {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .albumCard img {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            object-fit: cover;
            background: #0a0a12;
            box-shadow: 0 0 12px rgba(178, 123, 255, 0.25);
        }

        .albumCard:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(178, 123, 255, 0.45);
        }

        .albumName {
            margin-top: 6px;
            font-size: 13px;
            color: #d8caff;
            text-align: center;
        }

        #trackList {
            width: 100%;
            max-width: 360px;
            margin-top: 10px;
        }

        #backToAlbums {
            background: none;
            border: none;
            color: #b27bff;
            font-size: 16px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        #trackListHeader {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 14px;
        }

        #trackListAlbumArt {
            width: 180px;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            background: #0a0a12;
            box-shadow: 0 0 18px rgba(178, 123, 255, 0.35);
            margin-bottom: 10px;
        }

        #trackListAlbumName {
            font-size: 18px;
            color: #d8caff;
        }

        .trackItem {
            padding: 10px;
            margin-bottom: 6px;
            background: rgba(178, 123, 255, 0.08);
            border-radius: 8px;
            cursor: pointer;
        }

        #albumArtBox {
            width: 260px;
            height: 260px;
            border-radius: 14px;
            overflow: hidden;
            background: #0a0a12;
        }

        #albumArt {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #playButton {
            background: #b27bff;
            border: none;
            padding: 12px 26px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }

        #progressSlider {
            width: 260px;
            accent-color: #b27bff;
        }

        #nowPlaying {
            font-size: 14px;
            color: #bfa8ff;
        }

        #status {
            font-size: 13px;
            color: #8dd48d;
        }

        #albumDropdown, #trackDropdown {
            display: none;
        }
    </style>
</head>

<body>

<div id="container">

<h1>Musicly</h1>

<div id="dropzone">
    Drop MusicVault.zip here<br>
    (online import → offline forever)
</div>

<div id="status"></div>

<div id="albumGrid"></div>

<div id="trackList" class="hidden">
    <button id="backToAlbums">← Back</button>

    <div id="trackListHeader">
        <img id="trackListAlbumArt" src="" alt="Album Art">
        <div id="trackListAlbumName"></div>
    </div>

    <div id="trackListInner"></div>
</div>

<div id="albumArtBox">
    <img id="albumArt" src="" alt="Album Art">
</div>

<select id="albumDropdown"></select>
<select id="trackDropdown"></select>

<button id="playButton">Play</button>

<input type="range" id="progressSlider" min="0" max="100" value="0">

<div id="nowPlaying">Now Playing: (none)</div>

<audio id="player"></audio>

</div>

<!-- Scripts -->
<script src="/Musicly/jszip.min.js"></script>
<script src="/Musicly/app.js"></script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Musicly/sw.js')
            .then(() => console.log("Service Worker Registered"))
            .catch(console.error);
    });
}
</script>

</body>
</html>
