<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musicly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Musicly">

    <style>
        body {
            background: #050509;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Center everything */
        #container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 16px;
        }

        h1 {
            color: #b27bff;
            margin-bottom: 20px;
        }

        select {
            background: #141421;
            color: #eee;
            border: 1px solid #2a2a3a;
            padding: 6px;
            border-radius: 6px;
            margin: 6px 0 12px 0;
            width: 260px;
        }

        button {
            background: #b27bff;
            border: none;
            padding: 8px 14px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #c89dff;
        }

        #progressSlider {
            width: 260px;
        }

        #nowPlaying {
            font-size: 13px;
            color: #aaa;
            margin-top: 10px;
        }

        #dropzone {
            width: 100%;
            max-width: 350px;
            height: 160px;
            border: 3px dashed #b27bff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b27bff;
            font-size: 18px;
            margin-top: 20px;
            transition: 0.2s;
            padding: 10px;
        }

        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #8dd48d;
        }
    </style>
</head>
<body>

<div id="container">

<h1>Musicly</h1>

<div id="dropzone">
    Drop MusicVault.zip here (online)<br>
    It will be saved for offline use automatically.
</div>

<div id="status"></div>

<br>

<label>Album:</label><br>
<select id="albumDropdown"></select><br>

<label>Track:</label><br>
<select id="trackDropdown"></select><br>

<button id="playButton">Play</button>

<br><br>

<input type="range" id="progressSlider" min="0" max="100" value="0">

<div id="nowPlaying">Now Playing: (none)</div>

<audio id="player"></audio>

</div>

<script src="jszip.min.js"></script>
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
    });
}
</script>

</body>
</html>
