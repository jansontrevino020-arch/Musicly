<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musicly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Musicly">

    <style>
        body {
            background: #050509;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Center everything */
        #container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 16px;
            gap: 20px;
        }

        h1 {
            color: #c9a6ff;
            font-size: 32px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #8f5cff;
        }

        /* Neon card dropzone */
        #dropzone {
            width: 100%;
            max-width: 360px;
            height: 160px;
            border: 2px dashed #b27bff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d5b7ff;
            font-size: 17px;
            padding: 10px;
            background: rgba(178, 123, 255, 0.05);
            box-shadow: 0 0 12px rgba(178, 123, 255, 0.25);
            transition: 0.2s;
        }

        #dropzone:hover {
            background: rgba(178, 123, 255, 0.12);
            box-shadow: 0 0 18px rgba(178, 123, 255, 0.35);
        }

        select {
            background: #141421;
            color: #eee;
            border: 1px solid #2a2a3a;
            padding: 8px;
            border-radius: 8px;
            width: 260px;
            font-size: 15px;
            box-shadow: 0 0 8px rgba(178, 123, 255, 0.15);
        }

        /* Neon play/pause button */
        #playButton {
            background: #b27bff;
            border: none;
            padding: 12px 26px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 0 12px rgba(178, 123, 255, 0.4);
            transition: 0.2s;
        }

        #playButton:hover {
            background: #c89dff;
            box-shadow: 0 0 18px rgba(200, 157, 255, 0.55);
        }

        #progressSlider {
            width: 260px;
            accent-color: #b27bff;
        }

        #nowPlaying {
            font-size: 14px;
            color: #bfa8ff;
            margin-top: 6px;
            text-shadow: 0 0 6px rgba(178, 123, 255, 0.4);
        }

        #status {
            font-size: 13px;
            color: #8dd48d;
        }
    </style>
</head>
<body>

<div id="container">

<h1>Musicly</h1>

<div id="dropzone">
    Drop MusicVault.zip here<br>
    (online import → offline forever)
</div>

<div id="status"></div>

<select id="albumDropdown"></select>
<select id="trackDropdown"></select>

<button id="playButton">Play</button>

<input type="range" id="progressSlider" min="0" max="100" value="0">

<div id="nowPlaying">Now Playing: (none)</div>

<audio id="player"></audio>

</div>

<script src="jszip.min.js"></script>
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
    });
}
</script>

</body>
</html>
