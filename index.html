<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musicly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="/Musicly/manifest.webmanifest">
    <meta name="theme-color" content="#050509">
    <meta name="description" content="A simple music streaming web app">

    <!-- 🍎 iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Musicly">
    <link rel="apple-touch-icon" href="/Musicly/icon-180.png">

    <style>
        /* your styles stay here */
    </style>
</head>

<body>

<div id="container">
    <!-- your UI stays here -->
</div>

<!-- Scripts -->
<script src="/Musicly/jszip.min.js"></script>
<script src="/Musicly/app.js"></script>

<!-- Service Worker Registration -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/Musicly/sw.js")
        .catch(err => console.error("SW registration failed:", err));
}
</script>

</body>
</html>
