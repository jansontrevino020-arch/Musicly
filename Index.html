<head>
    <title>Musicly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- GitHub Pages PWA + Repo Name Support -->
    <link rel="manifest" href="/Musicly/manifest.webmanifest">
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/Musicly/sw.js", { scope: "/Musicly/" });
        }
    </script>

    <style>
        body {
            background: #050509;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 16px;
        }
        h1 {
            color: #b27bff;
            margin-bottom: 10px;
        }
        select {
            background: #141421;
            color: #eee;
            border: 1px solid #2a2a3a;
            padding: 6px;
            border-radius: 6px;
            margin: 6px 0 12px 0;
            width: 260px;
        }
        button {
            background: #b27bff;
            border: none;
            padding: 8px 14px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #c89dff;
        }
        #progressSlider {
            width: 260px;
        }
        #nowPlaying {
            font-size: 13px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
